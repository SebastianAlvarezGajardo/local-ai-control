<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C5CFC"/>
      <stop offset="0.55" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D8F6FF"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <!-- subtle top sheen -->
  <rect x="16" y="16" width="480" height="240" rx="116" fill="#FFFFFF" opacity="0.07"/>

  <!-- neural-net glyph -->
  <g stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" opacity="0.92">
    <line x1="176" y1="176" x2="256" y2="256"/>
    <line x1="176" y1="336" x2="256" y2="256"/>
    <line x1="336" y1="176" x2="256" y2="256"/>
    <line x1="336" y1="336" x2="256" y2="256"/>
    <line x1="176" y1="176" x2="176" y2="336" opacity="0.5"/>
    <line x1="336" y1="176" x2="336" y2="336" opacity="0.5"/>
  </g>

  <!-- outer nodes -->
  <g fill="#FFFFFF" filter="url(#soft)">
    <circle cx="176" cy="176" r="26"/>
    <circle cx="176" cy="336" r="26"/>
    <circle cx="336" cy="176" r="26"/>
    <circle cx="336" cy="336" r="26"/>
  </g>

  <!-- central core node -->
  <circle cx="256" cy="256" r="50" fill="url(#core)" filter="url(#soft)"/>
  <circle cx="256" cy="256" r="50" fill="none" stroke="#7C5CFC" stroke-width="6" opacity="0.35"/>

  <!-- spark inside core: a small power/AI mark -->
  <path d="M256 226 v36 M238 256 h36" stroke="#5B8DEF" stroke-width="12" stroke-linecap="round"/>
</svg>
